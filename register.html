<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration | Exglobe Private Limited</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/register.css">
</head>

<body>

<div class="overlay"></div>

<section class="register-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="register-card">

<div class="text-center mb-4">

<img src="images/logo.png" class="logo" alt="Exglobe">

<h2 class="mt-3">Customer Registration</h2>

<p>Create your Exglobe account and start shipping worldwide.</p>

</div>

<form id="registerForm">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Full Name *</label>
<input
type="text"
class="form-control"
id="fullName"
required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Company Name</label>
<input
type="text"
class="form-control"
id="company">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Mobile Number *</label>
<input
type="text"
class="form-control"
id="mobile"
required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">WhatsApp Number *</label>
<input
type="text"
class="form-control"
id="whatsapp"
required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Email Address *</label>
<input
type="email"
class="form-control"
id="email"
required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Country *</label>

<select
class="form-select"
id="country">

<option value="">Select Country</option>

<option>Sri Lanka</option>

<option>China</option>

<option>India</option>

<option>UAE</option>

<option>Other</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Password *</label>

<input
type="password"
class="form-control"
id="password"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Confirm Password *</label>

<input
type="password"
class="form-control"
id="confirmPassword"
required>

</div>

<div class="col-12 mb-4">

<label class="form-label">Address</label>

<textarea
class="form-control"
rows="4"
id="address"></textarea>

</div>

<div class="col-12">

<button
type="submit"
class="btn btn-register w-100"
id="registerBtn">

Register Now

</button>

</div>

</div>

</form>

<div class="text-center mt-4">

Already have an account?

<a href="login.html">

Login Here

</a>

</div>

<div class="text-center mt-3">

<a href="index.html">

← Back to Home

</a>

</div>

</div>

</div>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="register.js"></script>

</body>

</html>
